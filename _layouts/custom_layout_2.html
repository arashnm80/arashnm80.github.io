---
layout: default
---

<article class="page" id="{{ page.title | slugify }}">
    <header class="page-header">
      <h1 class="page-title">{{ page.title | escape }}</h1>
    </header>
    <div class="page-content">
      {{ content }}
    </div>
    {% if page.comments %}
      {% include comments.html %}
    {% endif %}
  </article>
